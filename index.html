<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Enigmas Mundiales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .fondo-nexus {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(10, 15, 40, 0.65), rgba(25, 10, 50, 0.75)), 
                        url('https://i.imgur.com/9XfQ7gL.png') center/cover no-repeat;
        }

        .contenedor {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 20px;
        }

        .titulo {
            color: #ffd700;
            font-size: 3rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            text-align: center;
        }

        .subtitulo {
            color: #e0e0ff;
            font-size: 1.2rem;
            text-align: center;
            max-width: 550px;
        }

        /* Botones y cajas */
        .boton-entrar {
            padding: 16px 55px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #0a0a2a;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            transition: all 0.3s ease;
        }
        .boton-entrar:hover { transform: scale(1.08); box-shadow: 0 0 40px rgba(255,215,0,0.9); }

        .caja-opciones, .caja-nick, .caja-perfil {
            display: none;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            max-width: 420px;
            animation: aparecer 0.5s ease;
        }
        @keyframes aparecer {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }

        .boton-invitado {
            padding: 14px 45px;
            font-size: 1.2rem;
            color: #fff;
            background: rgba(60, 80, 180, 0.8);
            border: 2px solid #8899ff;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .boton-invitado:hover { background: rgba(80,100,200,0.9); transform: scale(1.05); }

        .boton-miembro {
            padding: 14px 45px;
            font-size: 1.2rem;
            color: #0a0a2a;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .boton-miembro:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,215,0,0.7); }

        .entrada-texto {
            padding: 14px 20px;
            font-size: 1.2rem;
            border: 2px solid #ffd700;
            border-radius: 12px;
            background: rgba(10,15,40,0.8);
            color: #fff;
            text-align: center;
        }
        .entrada-texto::placeholder { color: #aaaacc; }

        .boton-aceptar {
            padding: 12px 30px;
            font-size: 1.1rem;
            background: #22aa55;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .boton-aceptar:hover { background: #33cc66; }

        .caja-perfil {
            background: rgba(15,10,40,0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            text-align: center;
        }
        .perfil-nombre { color: #ffd700; font-size: 1.8rem; font-weight: bold; margin-bottom:10px; }
        .perfil-rol { color: #aaffaa; font-size: 1.1rem; margin-bottom:20px; }
        .boton-avatar { background: #aa55ff; color:white; padding:12px; border-radius:10px; border:none; cursor:pointer; font-size:1rem; }
        .boton-avatar:hover { background: #cc77ff; }
        .boton-atras { background: #555; color:white; padding:10px; border-radius:8px; border:none; margin-top:15px; cursor:pointer; }

        .texto-opcion { color: #ccccff; font-size: 0.95rem; text-align: center; }

        @media (max-width: 500px) {
            .titulo { font-size: 2.2rem; }
            .boton-entrar, .boton-invitado, .boton-miembro { font-size: 1.1rem; padding:12px 35px; }
        }
    </style>
</head>
<body>
    <div class="fondo-nexus"></div>
    <div class="contenedor">

        <!-- Paso 1: Botón principal -->
        <button class="boton-entrar" id="btnPrincipal" onclick="mostrarOpciones()">ENTRAR AL NEXUS</button>

        <!-- Paso 2: Elegir tipo de acceso -->
        <div class="caja-opciones" id="cajaOpciones">
            <h2 style="color:#ffd700; text-align:center;">Elige tu acceso</h2>
            <button class="boton-invitado" onclick="accesoInvitado()">🚪 Entrar como Invitado</button>
            <p class="texto-opcion">Explora rápido sin registrarte</p>
            <button class="boton-miembro" onclick="mostrarCajaNick()">✨ Entrar como Miembro</button>
            <p class="texto-opcion">Crea tu perfil, avatar y guarda tu progreso</p>
        </div>

        <!-- Paso 3: Escribir Nick (solo Miembro) -->
        <div class="caja-nick" id="cajaNick">
            <h2 style="color:#ffd700; text-align:center;">Escribe tu apodo</h2>
            <input type="text" id="inputNick" class="entrada-texto" placeholder="Tu nombre en Nexus..." maxlength="15">
            <button class="boton-aceptar" onclick="guardarNick()">Continuar</button>
            <button class="boton-atras" onclick="volverOpciones()">← Atrás</button>
        </div>

        <!-- Paso 4: Perfil del Miembro -->
        <div class="caja-perfil" id="cajaPerfil">
            <div class="perfil-nombre" id="nombrePerfil"></div>
            <div class="perfil-rol">🌟 Miembro de Nexus</div>
            <p style="color:#ddd; margin-bottom:15px;">Ahora puedes crear tu avatar personalizado:</p>
            <button class="boton-avatar" onclick="irAvatar()">🎨 Crear mi Avatar</button>
            <button class="boton-atras" onclick="volverInicio()">← Volver al inicio</button>
        </div>

    </div>

    <script>
        function mostrarOpciones() {
            document.getElementById('btnPrincipal').style.display = 'none';
            document.getElementById('cajaOpciones').style.display = 'flex';
        }

        function accesoInvitado() {
            alert("👋 Bienvenido Invitado! Accediendo a la Sala de Saberes...\nTu nombre temporal será: Invitado_" + Math.floor(Math.random()*999));
            // Aquí enlazamos a la sala después
        }

        function mostrarCajaNick() {
            document.getElementById('cajaOpciones').style.display = 'none';
            document.getElementById('cajaNick').style.display = 'flex';
        }

        function guardarNick() {
            const nick = document.getElementById('inputNick').value.trim();
            if(nick.length < 2) {
                alert("Por favor escribe un apodo de al menos 2 letras");
                return;
            }
            // Guardamos el nombre para usarlo en todo el proyecto
            localStorage.setItem('nexus_nick', nick);
            
            // Mostramos el perfil
            document.getElementById('cajaNick').style.display = 'none';
            document.getElementById('nombrePerfil').textContent = nick;
            document.getElementById('cajaPerfil').style.display = 'flex';
        }

        function irAvatar() {
            alert("Vamos a abrir la herramienta gratuita para crear tu avatar ✨");
            // Aquí enlazaremos Ready Player Me después
        }

        function volverOpciones() {
            document.getElementById('cajaNick').style.display = 'none';
            document.getElementById('cajaOpciones').style.display = 'flex';
        }

        function volverInicio() {
            document.getElementById('cajaPerfil').style.display = 'none';
            document.getElementById('btnPrincipal').style.display = 'block';
            localStorage.removeItem('nexus_nick');
        }
    </script>
</body>
</html>
