<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - El Espacio de los Saberes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { width: 100vw; height: 100vh; overflow-x: hidden; position: relative; }

        /* Fondo CIELO NOCTURNO ESTRELLADO */
        .fondo-nexus {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #05071a 0%, #0f173a 40%, #1a2a5a 100%);
        }
        .estrellas {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 60px 70px, #fff, transparent),
                radial-gradient(1px 1px at 50px 50px, #cce0ff, transparent),
                radial-gradient(1px 1px at 130px 80px, #cce0ff, transparent),
                radial-gradient(2px 2px at 90px 10px, #fff, transparent);
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.7;
        }

        .contenedor {
            position: relative; z-index: 2; width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 15px; padding: 20px 15px;
        }

        .titulo { color: #ffd700; font-size: 2.2rem; font-weight: 700; text-shadow: 0 0 25px rgba(100,150,255,0.6); text-align: center; }
        .subtitulo { color:#bbd4ff; font-size:1rem; text-align:center; margin-bottom:15px; line-height:1.4; }

        .boton-entrar {
            padding: 15px 50px; font-size: 1.4rem; font-weight: 600; color: #0a0a2a;
            background: linear-gradient(135deg, #ffd700, #ffaa00); border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 25px rgba(255,215,0,0.5); transition: all 0.3s ease;
        }
        .boton-entrar:hover { transform: scale(1.07); box-shadow: 0 0 35px rgba(255,215,0,0.7); }

        .boton-invitado, .boton-miembro, .boton-creador {
            padding: 12px 40px; font-size: 1.1rem; border-radius: 50px; border: none;
            cursor: pointer; transition: 0.3s; margin: 5px 0; width:100%;
        }
        .boton-invitado { background: rgba(50,80,180,0.7); color:#fff; border:2px solid #88aaff; }
        .boton-invitado:hover { background: rgba(70,100,200,0.9); transform: scale(1.03); }
        .boton-miembro { background: linear-gradient(135deg, #ffd700, #ffaa00); color:#0a0a2a; font-weight:600; }
        .boton-miembro:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(255,215,0,0.6); }

        .caja {
            display: none; flex-direction: column; gap: 12px; width: 100%; max-width: 420px;
            background: rgba(10,15,40,0.9); padding: 25px; border-radius: 20px;
            border: 2px solid #5577dd; animation: aparecer 0.5s ease;
        }
        @keyframes aparecer { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

        .caja h2 { color: #ffd700; text-align: center; font-size: 1.5rem; margin-bottom:8px; }
        .caja h3 { color:#aaccff; font-size:1.1rem; margin-top:10px; margin-bottom:5px; }
        .etiqueta { color: #bbd4ff; font-size: 0.95rem; margin-top:5px; }
        .entrada {
            padding: 12px 15px; font-size: 1rem; border: 2px solid #4466aa; border-radius: 10px;
            background: rgba(15,20,50,0.8); color: #fff;
        }
        .entrada:focus { border-color: #ffd700; outline: none; }
        .entrada::placeholder { color: #7788bb; }

        .boton-principal {
            padding: 12px; font-size: 1.1rem; font-weight: 500; border: none; border-radius: 10px;
            cursor: pointer; transition: 0.3s; margin-top:10px; width:100%;
        }
        .btn-verde { background: #22aa55; color: white; }
        .btn-verde:hover { background: #33cc66; }
        .btn-morado { background: #7755cc; color: white; }
        .btn-morado:hover { background: #9977ee; }
        .btn-azul { background: #3366dd; color: white; }
        .btn-azul:hover { background: #5588ff; }
        .btn-naranja { background: #ff8822; color: white; }
        .btn-naranja:hover { background: #ff9944; }
        .btn-rojo { background: #cc3333; color: white; font-size:0.9rem; padding:8px; border-radius:8px; width:100%; }
        .btn-rojo:hover { background: #ee4444; }

        .texto-cambio { color: #aaccff; text-align: center; font-size: 0.9rem; margin-top:8px; }
        .enlace { color: #ffd700; cursor: pointer; font-weight: 500; }
        .enlace:hover { text-decoration: underline; }

        .boton-atras {
            background: #445588; color: white; padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; margin-top:10px; transition:0.3s; width:100%;
        }
        .boton-atras:hover { background: #6677aa; }

        .aviso { color: #aaffcc; text-align: center; font-size: 0.9rem; line-height:1.5; }
        .aviso-pequeno { color:#ffddaa; font-size:0.8rem; text-align:center; margin:5px 0; }
        .avatar-preview { width:100px; height:100px; border-radius:50%; border:3px solid #ffd700; margin:10px auto; background:#223; display:flex; align-items:center; justify-content:center; font-size:3rem; color:#ffd700; overflow:hidden; }

        @media (max-width: 480px) {
            .titulo { font-size: 1.8rem; }
            .caja { padding: 20px 15px; }
        }
    </style>
</head>
<body>
    <div class="fondo-nexus"></div>
    <div class="estrellas"></div>
    <div class="contenedor">

        <button class="boton-entrar" id="btnInicio" onclick="mostrarOpciones()">ENTRAR AL NEXUS</button>

        <div class="caja" id="cajaOpciones">
            <h2>Elige tu acceso</h2>
            <button class="boton-invitado" onclick="accesoInvitado()">🚪 Entrar como Invitado</button>
            <button class="boton-miembro" onclick="mostrarInicioSesion()">👤 Ya tengo cuenta</button>
            <button class="boton-miembro" onclick="mostrarRegistro()">✨ Crear cuenta nueva</button>
            <button class="boton-atras" onclick="volverInicio()">← Volver</button>
        </div>

        <div class="caja" id="cajaLogin">
            <h2>Iniciar Sesión</h2>
            <label class="etiqueta">Usuario:</label>
            <input type="text" id="loginUsuario" class="entrada" placeholder="Tu nombre">
            <label class="etiqueta">Contraseña:</label>
            <input type="password" id="loginPass" class="entrada" placeholder="Tu clave">
            <button class="boton-principal btn-verde" onclick="verificarLogin()">Ingresar</button>
            <p class="texto-cambio">¿Sin cuenta? <span class="enlace" onclick="mostrarRegistro()">Crear aquí</span></p>
            <button class="boton-atras" onclick="volverOpciones()">← Atrás</button>
        </div>

        <div class="caja" id="cajaRegistro">
            <h2>Crear Cuenta</h2>
            <label class="etiqueta">Nombre de Usuario *</label>
            <input type="text" id="regUsuario" class="entrada" placeholder="Máx 15 caracteres" maxlength="15" required>
            <label class="etiqueta">Contraseña *</label>
            <input type="password" id="regPass" class="entrada" placeholder="Mínimo 6 caracteres" required>
            <button class="boton-principal btn-verde" onclick="guardarRegistro()">Siguiente: Crear Avatar</button>
            <p class="texto-cambio">¿Ya tienes cuenta? <span class="enlace" onclick="mostrarInicioSesion()">Iniciar sesión</span></p>
            <button class="boton-atras" onclick="volverOpciones()">← Atrás</button>
        </div>

        <div class="caja" id="cajaCreador">
            <h2>🎨 Tu Avatar</h2>
            <p class="aviso">Elige la opción que prefieras, sin errores</p>

            <h3>1. Avatar rápido</h3>
            <label class="etiqueta">Símbolo o inicial:</label>
            <input type="text" id="simboloAvatar" class="entrada" maxlength="2" placeholder="Ej: N, ☀️, 🦅">
            <label class="etiqueta">Color:</label>
            <input type="color" id="colorAvatar" value="#ffd700" style="width:100%; height:40px; border:none; border-radius:8px; margin:5px 0;">
            <button class="boton-principal btn-azul" onclick="generarAvatarRapido()">✅ Generar</button>

            <h3>2. Imagen o IA</h3>
            <p class="aviso-pequeno">Pega el enlace de tu imagen o la que crees con inteligencia artificial</p>
            <input type="text" id="enlaceImagen" class="entrada" placeholder="Enlace de la imagen">
            <button class="boton-principal btn-azul" onclick="usarImagen()">✅ Usar imagen</button>

            <div class="avatar-preview" id="vistaAvatar">👤</div>
            <button class="boton-principal btn-verde" onclick="guardarMiAvatar()">✅ Guardar y continuar</button>
            <button class="boton-atras" onclick="volverPerfil()">← Más tarde</button>
        </div>

        <div class="caja" id="cajaPerfil">
            <h2>👤 Tu Perfil</h2>
            <div class="avatar-preview" id="avatarPerfil">👤</div>
            <div style="text-align:center; color:#ffd700; font-weight:bold; font-size:1.5rem;" id="nombrePerfil"></div>
            <button class="boton-principal btn-morado" onclick="abrirCreadorDesdePerfil()">🔄 Cambiar Avatar</button>
            <button class="boton-principal btn-naranja" onclick="irSalaSaberes()">📚 Sala de Saberes</button>
            <button class="boton-principal btn-naranja" onclick="irSalaCreacion()">🔗 Sala de Creación</button>
            <button class="boton-atras" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>

    </div>

    <script>
        function mostrarOpciones() { document.getElementById('btnInicio').style.display = 'none'; document.getElementById('cajaOpciones').style.display = 'flex'; }
        function ocultarTodasCajas() { document.querySelectorAll('.caja').forEach(c => c.style.display = 'none'); }
        function volverInicio() { ocultarTodasCajas(); document.getElementById('btnInicio').style.display = 'block'; }
        function volverOpciones() { ocultarTodasCajas(); document.getElementById('cajaOpciones').style.display = 'flex'; }
        function volverPerfil() { ocultarTodasCajas(); document.getElementById('cajaPerfil').style.display = 'flex'; }

        function accesoInvitado() {
            const nombreTemp = "Invitado_" + Math.floor(Math.random()*9999);
            alert(`👋 Bienvenido ${nombreTemp}!`);
            localStorage.setItem('nexus_tipo', 'invitado');
            localStorage.setItem('nexus_nick', nombreTemp);
            window.location.href = "sala.html";
        }
        function mostrarInicioSesion() { ocultarTodasCajas(); document.getElementById('cajaLogin').style.display = 'flex'; }
        function mostrarRegistro() { ocultarTodasCajas(); document.getElementById('cajaRegistro').style.display = 'flex'; }

        function guardarRegistro() {
            const u = document.getElementById('regUsuario').value.trim();
            const p = document.getElementById('regPass').value.trim();
            if(u.length<2) return alert("Mínimo 2 caracteres de usuario");
            if(p.length<6) return alert("Mínimo 6 caracteres de contraseña");
            localStorage.setItem('nexus_tipo', 'miembro');
            localStorage.setItem('nexus_nick', u);
            localStorage.setItem('nexus_pass', p);
            localStorage.setItem('nexus_avatar', '');
            alert("✅ Cuenta creada! Ahora tu avatar");
            ocultarTodasCajas(); document.getElementById('cajaCreador').style.display = 'flex';
        }

        function verificarLogin() {
            const u = document.getElementById('loginUsuario').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            const gu = localStorage.getItem('nexus_nick');
            const gp = localStorage.getItem('nexus_pass');
            if(u===gu && p===gp) { alert("✅ Bienvenido "+u); mostrarPerfil(); }
            else alert("❌ Datos incorrectos");
        }

        function generarAvatarRapido() {
            const s = document.getElementById('simboloAvatar').value.trim() || '👤';
            const c = document.getElementById('colorAvatar').value;
            const av = `data:image/svg+xml;base64,${btoa(`<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="90" fill="${c}" stroke="#fff" stroke-width="5"/><text x="100" y="130" font-size="80" fill="#fff" text-anchor="middle">${s}</text></svg>`)}`;
            document.getElementById('vistaAvatar').innerHTML = `<img src="${av}" style="width:100%;height:100%;object-fit:cover;">`;
            localStorage.setItem('nexus_avatar', av);
            alert("✅ Avatar listo!");
        }

        function usarImagen() {
            const l = document.getElementById('enlaceImagen').value.trim();
            if(!l) return alert("Pega primero el enlace");
            document.getElementById('vistaAvatar').innerHTML = `<img src="${l}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='⚠️'">`;
            localStorage.setItem('nexus_avatar', l);
        }

        function guardarMiAvatar() {
            if(!localStorage.getItem('nexus_avatar')) return alert("Primero crea o elige tu avatar");
            alert("✅ Avatar guardado!"); mostrarPerfil();
        }

        function abrirCreadorDesdePerfil() { ocultarTodasCajas(); document.getElementById('cajaCreador').style.display = 'flex'; document.getElementById('vistaAvatar').innerHTML='👤'; }
        function mostrarPerfil() {
            ocultarTodasCajas();
            const u = localStorage.getItem('nexus_nick');
            const a = localStorage.getItem('nexus_avatar') || '';
            document.getElementById('nombrePerfil').textContent = u;
            document.getElementById('avatarPerfil').innerHTML = a ? `<img src="${a}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : '👤';
            document.getElementById('cajaPerfil').style.display = 'flex';
        }
        function cerrarSesion() { if(confirm("¿Salir?")) { localStorage.clear(); volverInicio(); } }
        
        // ENLACES CORREGIDOS SIN ERRORES
        function irSalaSaberes() { window.location.href = "sala.html"; }
        function irSalaCreacion() { window.location.href = "sala2.html"; }
    </script>
</body>
</html>
