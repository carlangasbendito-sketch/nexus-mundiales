<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Enigmas Mundiales</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { width: 100vw; height: 100vh; overflow-x: hidden; position: relative; }

        .fondo-nexus {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(10,15,40,0.7), rgba(25,10,50,0.8)), 
                        url('https://i.imgur.com/9XfQ7gL.png') center/cover no-repeat;
        }

        .contenedor {
            position: relative; z-index: 2; width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 20px; padding: 25px 15px;
        }

        .titulo { color: #ffd700; font-size: 2.6rem; font-weight: 700; text-shadow: 0 0 20px rgba(255,215,0,0.5); text-align: center; }
        .subtitulo { color: #e0e0ff; font-size: 1.1rem; text-align: center; max-width: 500px; }

        /* Botones principales */
        .boton-entrar {
            padding: 15px 50px; font-size: 1.4rem; font-weight: 600; color: #0a0a2a;
            background: linear-gradient(135deg, #ffd700, #ffaa00); border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 25px rgba(255,215,0,0.6); transition: all 0.3s ease;
        }
        .boton-entrar:hover { transform: scale(1.07); box-shadow: 0 0 35px rgba(255,215,0,0.8); }

        .boton-invitado {
            padding: 13px 45px; font-size: 1.15rem; color: #fff;
            background: rgba(60,80,180,0.8); border: 2px solid #8899ff; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
        }
        .boton-invitado:hover { background: rgba(80,100,200,0.9); transform: scale(1.03); }

        .boton-miembro {
            padding: 13px 45px; font-size: 1.15rem; color: #0a0a2a;
            background: linear-gradient(135deg, #ffd700, #ffaa00); border: 2px solid #ffcc00; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
        }
        .boton-miembro:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(255,215,0,0.7); }

        /* Cajas y formularios */
        .caja {
            display: none; flex-direction: column; gap: 15px; width: 100%; max-width: 400px;
            background: rgba(15,10,40,0.92); padding: 25px; border-radius: 20px;
            border: 2px solid #ffd700; animation: aparecer 0.5s ease;
        }
        @keyframes aparecer { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

        .caja h2 { color: #ffd700; text-align: center; font-size: 1.5rem; margin-bottom:5px; }
        .etiqueta { color: #ccddff; font-size: 0.95rem; margin-top:5px; }
        .entrada {
            padding: 12px 15px; font-size: 1rem; border: 2px solid #4455aa; border-radius: 10px;
            background: rgba(10,15,40,0.7); color: #fff;
        }
        .entrada:focus { border-color: #ffd700; outline: none; }
        .entrada::placeholder { color: #8888aa; }

        .boton-principal {
            padding: 12px; font-size: 1.1rem; font-weight: 500; border: none; border-radius: 10px;
            cursor: pointer; transition: 0.3s; margin-top:5px;
        }
        .btn-verde { background: #22aa55; color: white; }
        .btn-verde:hover { background: #33cc66; }
        .btn-morado { background: #9955dd; color: white; }
        .btn-morado:hover { background: #aa66ee; }

        .texto-cambio { color: #aaccff; text-align: center; font-size: 0.9rem; margin-top:8px; }
        .enlace { color: #ffd700; cursor: pointer; font-weight: 500; }
        .enlace:hover { text-decoration: underline; }

        .boton-atras {
            background: #444; color: white; padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; margin-top:10px; transition:0.3s;
        }
        .boton-atras:hover { background: #666; }

        /* Perfil */
        .perfil-nombre { color: #ffd700; font-size: 1.7rem; font-weight: bold; text-align:center; }
        .perfil-datos { color: #ccddff; font-size: 1rem; text-align:center; margin:10px 0; }

        @media (max-width: 480px) {
            .titulo { font-size: 2rem; }
            .caja { padding: 20px 15px; }
        }
    </style>
</head>
<body>
    <div class="fondo-nexus"></div>
    <div class="contenedor">

        <!-- Inicio -->
        <button class="boton-entrar" id="btnInicio" onclick="mostrarOpciones()">ENTRAR AL NEXUS</button>

        <!-- Elegir acceso -->
        <div class="caja" id="cajaOpciones">
            <h2>Elige tu forma de acceso</h2>
            <button class="boton-invitado" onclick="accesoInvitado()">🚪 Entrar como Invitado</button>
            <button class="boton-miembro" onclick="mostrarInicioSesion()">👤 Soy Miembro</button>
            <button class="boton-miembro" onclick="mostrarRegistro()">✨ Crear cuenta nueva</button>
            <button class="boton-atras" onclick="volverInicio()">← Volver</button>
        </div>

        <!-- Iniciar Sesión -->
        <div class="caja" id="cajaLogin">
            <h2>Iniciar Sesión</h2>
            <label class="etiqueta">Usuario o Correo:</label>
            <input type="text" id="loginUsuario" class="entrada" placeholder="Tu usuario o correo">
            <label class="etiqueta">Contraseña:</label>
            <input type="password" id="loginPass" class="entrada" placeholder="Tu contraseña">
            <button class="boton-principal btn-verde" onclick="verificarLogin()">Ingresar</button>
            <p class="texto-cambio">¿No tienes cuenta? <span class="enlace" onclick="mostrarRegistro()">Regístrate aquí</span></p>
            <button class="boton-atras" onclick="volverOpciones()">← Atrás</button>
        </div>

        <!-- Formulario Registro Completo -->
        <div class="caja" id="cajaRegistro">
            <h2>Crear tu Perfil de Miembro</h2>
            
            <label class="etiqueta">Nombre de Usuario *</label>
            <input type="text" id="regUsuario" class="entrada" placeholder="Tu nombre público" maxlength="15" required>
            
            <label class="etiqueta">Contraseña *</label>
            <input type="password" id="regPass" class="entrada" placeholder="Mínimo 6 caracteres" required>
            
            <label class="etiqueta">Correo Electrónico *</label>
            <input type="email" id="regCorreo" class="entrada" placeholder="tucorreo@ejemplo.com" required>
            
            <label class="etiqueta">Nacionalidad *</label>
            <input type="text" id="regNacion" class="entrada" placeholder="Ej: México, Argentina, España..." required>

            <button class="boton-principal btn-verde" onclick="guardarRegistro()">Finalizar Registro</button>
            <p class="texto-cambio">¿Ya tienes cuenta? <span class="enlace" onclick="mostrarInicioSesion()">Inicia sesión</span></p>
            <button class="boton-atras" onclick="volverOpciones()">← Atrás</button>
        </div>

        <!-- Perfil del Miembro -->
        <div class="caja" id="cajaPerfil">
            <div class="perfil-nombre" id="nombrePerfil"></div>
            <div class="perfil-datos">
                <p>📧 Correo: <span id="correoPerfil"></span></p>
                <p>🌎 Nacionalidad: <span id="nacionPerfil"></span></p>
                <p>🌟 Tipo: Miembro de Nexus</p>
            </div>
            <button class="boton-principal btn-morado" onclick="abrirCreadorAvatar()">🎨 Crear mi Avatar</button>
            <button class="boton-principal btn-verde" onclick="irSalaSaberes()">📚 Ir a la Sala de Saberes</button>
            <button class="boton-atras" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>

    </div>

    <script>
        // --- Navegación básica ---
        function mostrarOpciones() {
            document.getElementById('btnInicio').style.display = 'none';
            document.getElementById('cajaOpciones').style.display = 'flex';
        }
        function volverInicio() {
            ocultarTodasCajas();
            document.getElementById('btnInicio').style.display = 'block';
        }
        function volverOpciones() {
            ocultarTodasCajas();
            document.getElementById('cajaOpciones').style.display = 'flex';
        }
        function ocultarTodasCajas() {
            document.querySelectorAll('.caja').forEach(caja => caja.style.display = 'none');
        }

        // --- Invitado ---
        function accesoInvitado() {
            const nombreTemp = "Invitado_" + Math.floor(Math.random()*9999);
            alert(`👋 Bienvenido ${nombreTemp}! Accediendo a la Sala de Saberes...`);
            localStorage.setItem('nexus_tipo', 'invitado');
            localStorage.setItem('nexus_nick', nombreTemp);
        }

        // --- Sesión y Registro ---
        function mostrarInicioSesion() {
            ocultarTodasCajas();
            document.getElementById('cajaLogin').style.display = 'flex';
        }
        function mostrarRegistro() {
            ocultarTodasCajas();
            document.getElementById('cajaRegistro').style.display = 'flex';
        }

        function guardarRegistro() {
            const usuario = document.getElementById('regUsuario').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const correo = document.getElementById('regCorreo').value.trim();
            const nacion = document.getElementById('regNacion').value.trim();

            // Validaciones sencillas
            if(usuario.length < 2) return alert("El usuario debe tener al menos 2 caracteres");
            if(pass.length < 6) return alert("La contraseña debe tener al menos 6 caracteres");
            if(!correo.includes('@')) return alert("Escribe un correo válido");
            if(nacion.length < 2) return alert("Escribe tu nacionalidad");

            // Guardamos los datos del perfil
            localStorage.setItem('nexus_tipo', 'miembro');
            localStorage.setItem('nexus_nick', usuario);
            localStorage.setItem('nexus_pass', pass);
            localStorage.setItem('nexus_correo', correo);
            localStorage.setItem('nexus_nacion', nacion);

            alert("✅ Perfil creado correctamente! Bienvenido a Nexus " + usuario);
            mostrarPerfil();
        }

        function verificarLogin() {
            const ingreso = document.getElementById('loginUsuario').value.trim();
            const passIngreso = document.getElementById('loginPass').value.trim();

            const usuarioGuardado = localStorage.getItem('nexus_nick');
            const correoGuardado = localStorage.getItem('nexus_correo');
            const passGuardada = localStorage.getItem('nexus_pass');

            if((ingreso === usuarioGuardado || ingreso === correoGuardado) && passIngreso === passGuardada) {
                alert("✅ Bienvenido de nuevo " + usuarioGuardado + "!");
                mostrarPerfil();
            } else {
                alert("❌ Datos incorrectos o no existe la cuenta. Regístrate primero.");
            }
        }

        function mostrarPerfil() {
            ocultarTodasCajas();
            document.getElementById('nombrePerfil').textContent = localStorage.getItem('nexus_nick');
            document.getElementById('correoPerfil').textContent = localStorage.getItem('nexus_correo');
            document.getElementById('nacionPerfil').textContent = localStorage.getItem('nexus_nacion');
            document.getElementById('cajaPerfil').style.display = 'flex';
        }

        function cerrarSesion() {
            if(confirm("¿Seguro que quieres cerrar sesión?")) {
                localStorage.removeItem('nexus_tipo');
                volverInicio();
            }
        }

        // --- Avatar y Sala ---
        function abrirCreadorAvatar() {
            window.open("https://vr.readyplayer.me/avatar?lang=es", 'CreadorAvatar', 'width=900,height=700');
            alert("Guarda tu avatar y regresa aquí para continuar ✨");
        }
        function irSalaSaberes() {
            alert(`📚 Accediendo a la Sala de Saberes... Bienvenido/a ${localStorage.getItem('nexus_nick')}!`);
        }
    </script>
</body>
</html>
