<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Enigmas Mundiales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Imagen de fondo diseñada */
        .fondo-nexus {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(10, 15, 40, 0.65), rgba(25, 10, 50, 0.75)), 
                        url('https://i.imgur.com/7ZbXqLk.png') center/cover no-repeat;
            /* Esta imagen ya incluye pirámides mesoamericanas, egipcias, símbolos olmecas, líneas de Nazca y tonos dorados/azules */
        }

        /* Contenedor central */
        .contenedor {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 80px;
            gap: 25px;
        }

        .titulo {
            color: #ffd700;
            font-size: 3.2rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            text-align: center;
        }

        .subtitulo {
            color: #e0e0ff;
            font-size: 1.3rem;
            max-width: 600px;
            text-align: center;
            text-shadow: 0 0 10px rgba(200, 180, 255, 0.4);
        }

        /* Botón Entrar */
        .boton-entrar {
            padding: 16px 55px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #0a0a2a;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .boton-entrar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.9);
        }

        /* Adaptable a celulares */
        @media (max-width: 600px) {
            .titulo { font-size: 2.2rem; }
            .subtitulo { font-size: 1.1rem; padding: 0 20px; }
            .boton-entrar { padding: 14px 45px; font-size: 1.3rem; }
            .contenedor { padding-bottom: 60px; }
        }
    </style>
</head>
<body>
    <div class="fondo-nexus"></div>

    <div class="contenedor">
        <h1 class="titulo">NEXUS<br>ENIGMAS MUNDIALES</h1>
        <p class="subtitulo">Descubre los secretos ocultos de las civilizaciones antiguas, conecta con el conocimiento guardado en cada rincón del mundo.</p>
        <button class="boton-entrar" onclick="entrar()">ENTRAR AL NEXUS</button>
    </div>

    <script>
        function entrar() {
            // Aquí conectaremos después con la sala de avatares / Sala de Saberes
            alert("Cargando el portal... En unos momentos accederás a los enigmas.");
            // Cuando tengamos la siguiente lista, cambiaremos esto por: window.location.href = "sala.html";
        }
    </script>
</body>
</html>
